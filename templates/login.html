{% extends "base.html" %}

{% block content %}
<div style="display:flex; justify-content:center; align-items:flex-start; gap: 42px;">
    
    <div style="flex: 1;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Sign In</div>
            <div class="tab" onclick="switchTab('register')">Register (Patient)</div>
        </div>

        <div id="login-tab" class="tab-content active">
            <div class="form-card">
                <div style="text-align:center; margin-bottom: 24px;">
                    <div class="eyebrow">PORTAL ACCESS</div>
                    <h1 style="margin-top:0;">Ease Health</h1>
                </div>

                {% if error %}
                <div class="alert alert-error">{{ error }}</div>
                {% endif %}

                <form method="POST" action="/login">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required>
                    </div>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>
            </div>
        </div>

        <div id="register-tab" class="tab-content">
            <div class="form-card">
                <div class="eyebrow">NEW PATIENT REGISTRATION</div>
                <h2 style="margin-top:0;">Create Account</h2>

                {% if reg_error %}
                <div class="alert alert-error">{{ reg_error }}</div>
                {% endif %}

                <form method="POST" action="/register">
                    <div class="flex-row">
                        <div class="flex-col" style="flex:1;">
                            <div class="form-group">
                                <label>Full Name *</label>
                                <input type="text" name="full_name" required>
                            </div>
                            <div class="form-group">
                                <label>Email *</label>
                                <input type="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label>Password *</label>
                                <input type="password" name="password" required minlength="8" placeholder="Min 8 chars, 1 uppercase, 1 num, 1 special">
                            </div>
                            <div class="form-group">
                                <label>Date of Birth</label>
                                <input type="date" name="date_of_birth" value="2000-01-01">
                            </div>
                        </div>
                        <div class="flex-col" style="flex:1;">
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="text" name="phone">
                            </div>
                            <div class="form-group">
                                <label>Gender</label>
                                <select name="gender">
                                    <option>Male</option>
                                    <option>Female</option>
                                    <option selected>Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Blood Group</label>
                                <select name="blood_group">
                                    <option>A+</option><option>A-</option>
                                    <option>B+</option><option>B-</option>
                                    <option>AB+</option><option>AB-</option>
                                    <option selected>O+</option><option>O-</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Emergency Contact</label>
                                <input type="text" name="emergency_contact">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Register</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        if (tabId === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('login-tab').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('register-tab').classList.add('active');
        }
    }
</script>
{% endblock %}
